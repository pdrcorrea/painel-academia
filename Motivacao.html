<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0f;
  --card:#111118;
  --red:#e10600;
  --redSoft:rgba(225,6,0,.15);
  --text:#ffffff;
  --radius:28px;
  --transition:700ms cubic-bezier(.2,.8,.2,1);
}

*{box-sizing:border-box;}
html,body{
  margin:0;height:100%;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at 30% 20%,#151520,#08080c 70%);
  color:var(--text);
  overflow:hidden;
}

.shell{
  width:100vw;height:100vh;
  padding:clamp(20px,3vw,50px);
  display:flex;flex-direction:column;
}

.header{
  display:flex;justify-content:center;align-items:center;
}

.logo{
  height:clamp(70px,5vw,130px);
}

.card{
  flex:1;margin-top:40px;
  background:linear-gradient(145deg,#111118,#0c0c12);
  border-radius:var(--radius);
  border:1px solid var(--redSoft);
  box-shadow:0 0 80px rgba(225,6,0,.08);
  display:flex;align-items:center;justify-content:center;
  text-align:center;padding:60px;
  position:relative;overflow:hidden;
}

.label{
  position:absolute;top:25px;left:35px;
  font-weight:900;letter-spacing:.15em;
  text-transform:uppercase;font-size:14px;
  color:var(--red);
}

.message{
  font-weight:900;
  font-size:clamp(28px,4.2vw,62px);
  line-height:1.2;
  max-width:1200px;
  transition:var(--transition);
}

.fadeOut{opacity:0;transform:translateY(15px);}

.progress{
  position:absolute;bottom:0;left:0;
  height:6px;width:100%;
  background:rgba(255,255,255,.05);
}

.bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--red),#ff2a2a);
  transition:width 100ms linear;
}

.footer{
  margin-top:20px;
  display:flex;justify-content:flex-end;
}

.pvLogo{
  height:clamp(18px,2.5vh,28px);
  opacity:.9;
}
</style>
</head>
<body>

<div class="shell">

<div class="header">
<img src="logo-vinicius.png" class="logo">
</div>

<div class="card">
<div class="label" id="label"></div>
<div class="message" id="message"></div>
<div class="progress"><div class="bar" id="bar"></div></div>
</div>

<div class="footer">
<img src="https://i.ibb.co/G348XcMh/Ponto-View-4.png" class="pvLogo">

  {nome:"EDUCATIVO", dados:educativo},

];

let catIndex = 0;
let fraseIndex = 0;
let pool = [];

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function carregarCategoria(){
  pool = shuffle([...categorias[catIndex].dados]);
  fraseIndex = 0;
  document.getElementById("label").textContent = categorias[catIndex].nome;
}

carregarCategoria();

const message = document.getElementById("message");
const bar = document.getElementById("bar");

function next(){
  if(fraseIndex>=pool.length){
    catIndex = (catIndex+1)%categorias.length;
    carregarCategoria();
  }
  return pool[fraseIndex++];
}

function show(text){
  message.classList.add("fadeOut");
  setTimeout(()=>{
    message.textContent=text;
    message.classList.remove("fadeOut");
  },700);
}

let start=performance.now();

function animate(now){
  const p=((now-start)%ROTATE_MS)/ROTATE_MS;
  bar.style.width=(p*100)+"%";
  requestAnimationFrame(animate);
}

function rotate(){
  start=performance.now();
  show(next());
}
