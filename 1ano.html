<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Ano de Academia • Versão PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --gold1:#fff4bf;
  --gold2:#ffd54a;
  --gold3:#ffb300;
  --goldGlow:rgba(255,210,80,.75);
  --white:#ffffff;
  --muted:rgba(255,255,255,.86);
  --dark1:#050506;
  --dark2:#0d0d12;
  --dark3:#16161f;
  --red:#ff3b2f;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  overflow:hidden;
  font-family:'Inter',sans-serif;
  color:var(--white);
  background:
    linear-gradient(rgba(0,0,0,.82), rgba(0,0,0,.90)),
    url("https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1920&q=80");
  background-size:cover;
  background-position:center;
}

/* camadas extras para projetor */
.overlay{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(1000px 420px at 50% 18%, rgba(255,190,60,.10), transparent 60%),
    radial-gradient(900px 380px at 50% 82%, rgba(255,70,40,.08), transparent 60%),
    linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.25));
}

.shell{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:clamp(20px,3vw,46px);
  position:relative;
  z-index:1;
}

.top{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:84px;
}

.logo{
  height:clamp(60px,7vw,110px);
  width:auto;
  filter:drop-shadow(0 10px 24px rgba(0,0,0,.45));
}

/* centro */
.center{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:clamp(10px,1.5vw,18px);
  padding:0 4vw;
}

.kicker{
  font-size:clamp(20px,2vw,34px);
  font-weight:700;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:rgba(255,245,215,.95);
  text-shadow:0 0 12px rgba(255,215,80,.15);
}

.heroWrap{
  position:relative;
  display:inline-block;
}

.hero{
  position:relative;
  margin:0;
  font-size:clamp(110px,17vw,250px);
  line-height:.88;
  font-weight:900;
  letter-spacing:-.06em;
  background:linear-gradient(180deg,var(--gold1) 0%, var(--gold2) 45%, var(--gold3) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:
    0 0 10px rgba(255,210,80,.55),
    0 0 24px rgba(255,210,80,.35),
    0 0 55px rgba(255,180,0,.18);
  filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
}

/* brilho passando no texto */
.hero::after{
  content:"";
  position:absolute;
  top:-18%;
  left:-25%;
  width:34%;
  height:140%;
  background:linear-gradient(
    90deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,.00) 10%,
    rgba(255,255,255,.85) 50%,
    rgba(255,255,255,.00) 90%,
    rgba(255,255,255,0) 100%
  );
  transform:skewX(-22deg);
  mix-blend-mode:screen;
  filter:blur(2px);
  animation:shine 5.6s ease-in-out infinite;
  pointer-events:none;
}

@keyframes shine{
  0%{ left:-35%; opacity:0; }
  8%{ opacity:.95; }
  28%{ left:105%; opacity:.95; }
  32%{ opacity:0; }
  100%{ left:105%; opacity:0; }
}

.sub{
  font-size:clamp(28px,3vw,54px);
  font-weight:800;
  line-height:1.08;
  max-width:1200px;
  color:var(--white);
  text-shadow:0 6px 18px rgba(0,0,0,.35);
}

.rotator{
  margin-top:20px;
  min-height:clamp(80px,12vh,140px);
  display:flex;
  align-items:center;
  justify-content:center;
  max-width:1200px;
  padding:0 1vw;
}

.message{
  margin:0;
  font-size:clamp(26px,2.4vw,42px);
  line-height:1.18;
  font-weight:700;
  color:var(--muted);
  text-shadow:0 4px 14px rgba(0,0,0,.35);
  transition:all .65s cubic-bezier(.2,.8,.2,1);
}

.fadeOut{
  opacity:0;
  transform:translateY(16px);
}

.gold{
  color:#ffd54a;
  font-weight:900;
}

.red{
  color:#ff5a47;
  font-weight:900;
}

.bottomTag{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin-top:6px;
  padding:14px 22px;
  border-radius:999px;
  background:rgba(255,170,20,.08);
  border:1px solid rgba(255,210,80,.16);
  color:#fff4cf;
  font-size:clamp(11px,1vw,14px);
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
  box-shadow:0 0 24px rgba(255,180,0,.05);
}

.progress{
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:6px;
  background:rgba(255,255,255,.06);
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, rgba(255,220,100,.95), rgba(255,90,60,.95));
  box-shadow:0 0 16px rgba(255,200,80,.35);
  transition:width 120ms linear;
}

/* partículas mais visíveis em projetor */
.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}

.particles span{
  position:absolute;
  bottom:-40px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,245,180,1) 0%, rgba(255,196,50,.9) 45%, rgba(255,196,50,0) 75%);
  filter:blur(.3px);
  opacity:0;
  animation:floatUp linear infinite;
}

.particles span:nth-child(1){left:6%; width:10px; height:10px; animation-duration:8s; animation-delay:.5s;}
.particles span:nth-child(2){left:14%; width:6px; height:6px; animation-duration:10s; animation-delay:2.2s;}
.particles span:nth-child(3){left:24%; width:12px; height:12px; animation-duration:9s; animation-delay:1.1s;}
.particles span:nth-child(4){left:38%; width:8px; height:8px; animation-duration:11s; animation-delay:3s;}
.particles span:nth-child(5){left:50%; width:10px; height:10px; animation-duration:8.7s; animation-delay:1.7s;}
.particles span:nth-child(6){left:62%; width:7px; height:7px; animation-duration:10.4s; animation-delay:2.8s;}
.particles span:nth-child(7){left:74%; width:12px; height:12px; animation-duration:9.4s; animation-delay:.9s;}
.particles span:nth-child(8){left:86%; width:8px; height:8px; animation-duration:11.2s; animation-delay:1.8s;}
.particles span:nth-child(9){left:94%; width:6px; height:6px; animation-duration:9.6s; animation-delay:3.4s;}

@keyframes floatUp{
  0%{
    transform:translateY(0) scale(.7);
    opacity:0;
  }
  10%{opacity:.8;}
  75%{opacity:.45;}
  100%{
    transform:translateY(-115vh) scale(1.2);
    opacity:0;
  }
}

.footer{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  min-height:36px;
}

.pvLogo{
  height:clamp(18px,2.3vh,28px);
  opacity:.82;
  filter:brightness(1.15);
}

/* melhora em proporções verticais */
@media (orientation:portrait){
  .hero{
    font-size:clamp(120px,24vw,240px);
  }

  .sub{
    font-size:clamp(24px,5.2vw,44px);
  }

  .message{
    font-size:clamp(22px,4.7vw,36px);
  }

  .kicker{
    font-size:clamp(18px,3.4vw,28px);
  }
}

@media (max-height:700px){
  .hero{
    font-size:clamp(92px,13vw,190px);
  }

  .sub{
    font-size:clamp(22px,2.6vw,40px);
  }

  .message{
    font-size:clamp(18px,1.8vw,30px);
  }
}
</style>
</head>
<body>

<div class="overlay"></div>

<div class="particles" aria-hidden="true">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span>
</div>

<div class="shell">

  <div class="top">
    <img src="logo-vinicius.png" class="logo" alt="Vinicius Gomide" onerror="this.style.display='none'">
  </div>

  <div class="center">
    <div class="kicker">ESTAMOS COMPLETANDO</div>

    <div class="heroWrap">
      <h1 class="hero">1 ANO</h1>
    </div>

    <div class="sub">...E VOCÊ FAZ PARTE DESSA HISTÓRIA</div>

    <div class="rotator">
      <p class="message" id="message"></p>
    </div>


  </div>

  <div class="footer">
    <img src="https://i.ibb.co/G348XcMh/Ponto-View-4.png" class="pvLogo" alt="PontoView">
  </div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

</div>

<script>
const ROTATE_MS = 9000;

const mensagens = [
  'Obrigado a todos que fizeram parte dessa <span class="gold">jornada</span>.',
  'Cada treino ajudou a construir essa <span class="gold">história</span>.',
  'Um ano de <span class="red">disciplina</span>, <span class="red">energia</span> e <span class="red">evolução</span>.',
  'Essa conquista também é <span class="gold">sua</span>.',
  'O primeiro de <span class="gold">muitos anos</span> juntos.',
  'Seguimos mais fortes a cada <span class="red">dia</span>.',
  'Obrigado por confiar, treinar e crescer com a gente.'
];

function shuffle(array){
  const a = [...array];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let pool = shuffle(mensagens);
let index = 0;

const message = document.getElementById("message");
const bar = document.getElementById("bar");

function nextMessage(){
  if(index >= pool.length){
    pool = shuffle(mensagens);
    index = 0;
  }
  return pool[index++];
}

function showMessage(text){
  message.classList.add("fadeOut");
  setTimeout(()=>{
    message.innerHTML = text;
    message.classList.remove("fadeOut");
  }, 380);
}

let start = performance.now();

function animateProgress(now){
  const progress = ((now - start) % ROTATE_MS) / ROTATE_MS;
  bar.style.width = (progress * 100) + "%";
  requestAnimationFrame(animateProgress);
}

function rotate(){
  start = performance.now();
  showMessage(nextMessage());
}

showMessage(nextMessage());
setInterval(rotate, ROTATE_MS);
requestAnimationFrame(animateProgress);
</script>

</body>
</html>
